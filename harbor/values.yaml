# =========================
# Global
# =========================
externalURL: https://registry.services.atlantishq.de

harborAdminPassword: ""  # use existingSecret instead

existingSecretAdminPassword: harbor-secrets

# =========================
# Expose / Ingress
# =========================
expose:
  type: ingress

  tls:
    enabled: true
    certSource: harbor-tls-le

  ingress:
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.tls: "true"
      kubernetes.io/ingress.class: "traefik"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"

    hosts:
      core: registry.services.atlantishq.de

# =========================
# External Database
# =========================
database:
  type: external

  internal:
    enabled: false

  external:
    host: pgmaster.atlantishq.de
    port: 5432

    # pulled from secret
    existingSecret: harbor-db-secret
    existingSecretKey: DB_PASSWORD

    username: harbor

    coreDatabase: harbor
    notaryServerDatabase: harbor_notary_server
    notarySignerDatabase: harbor_notary_signer

    sslmode: require

# =========================
# Redis (internal)
# =========================
redis:
  type: internal

# =========================
# Storage (S3)
# =========================
persistence:
  enabled: true

  persistentVolumeClaim:
    registry:
      enabled: false
    jobservice:
      enabled: false
    database:
      enabled: false
    redis:
      enabled: false
    trivy:
      enabled: false

  imageChartStorage:
    type: s3

    s3:
      region: eu-central-1
      bucket: atlantis-harbor

      # endpoint (AWS or S3-compatible)
      regionendpoint: fsn1.your-objectstorage.com

      secure: true
      v4auth: true

      # credentials from secret
      existingSecret: harbor-secrets

# =========================
# Core Components
# =========================
core:
  replicas: 2
  logLevel: info

jobservice:
  jobLoggers:
    - stdout
  replicas: 2

registry:
  replicas: 2

portal:
  replicas: 2

trivy:
  enabled: true

# =========================
# Notary (optional, often disabled)
# =========================
notary:
  enabled: false

# =========================
# Metrics (optional)
# =========================
metrics:
  enabled: true
  serviceMonitor:
    enabled: false

# =========================
# Logging
# =========================
logLevel: info

# =========================
# Proxy (optional)
# =========================
proxy:
  httpProxy:
  httpsProxy:
  noProxy: 127.0.0.1,localhost,.local,.internal

# =========================
# Internal TLS (optional)
# =========================
internalTLS:
  enabled: false

# =========================
# Network policy (optional)
# =========================
networkPolicy:
  enabled: false

# =========================
# Cache (optional)
# =========================
cache:
  enabled: false

authMode: oidc_auth
oidc:
  name: keycloak
  endpoint: https://keycloak.atlantishq.com/realms/master
  clientId: harbor
  clientSecret: ""  # must be empty when using existingSecret

  existingSecret: async-icinga-oidc-config
  existingSecretKey: client-secret

  scope: openid,profile,email
  verifyCert: true

  autoOnboard: true
  userClaim: preferred_username

  groupsClaim: groups
  groupFilter: ""

  adminGroup: harbor-admins

  redirectURL: https://registry.services.atlantishq.de/c/oidc/callback
