apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metube-downloads-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metube
  template:
    metadata:
      labels:
        app: metube
    spec:
      containers:
        - name: metube
          image: ghcr.io/alexta69/metube:latest
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: downloads
              mountPath: /downloads
          env:
            - name: PUBLIC_HOST_URL
              value: https://yt-dowload.service.atlantishq.de/
      volumes:
        - name: downloads
          persistentVolumeClaim:
            claimName: metube-downloads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: metube
spec:
  selector:
    app: metube
  ports:
    - port: 80
      targetPort: 8081
  type: ClusterIP

