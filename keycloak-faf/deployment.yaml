apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:26.3.3

        args:
          - start
          - --import-realm

        env:
          #- name: KC_DB
          #  value: postgres

          - name: KC_HTTP_ENABLED
            value: "true"

          #- name: KC_DB_URL
          #  value: jdbc:postgresql://postgres-rw.database.svc.cluster.local:5432/keycloak

          #- name: KC_DB_USERNAME
          #  valueFrom:
          #    secretKeyRef:
          #      name: keycloak-db
          #      key: username

          #- name: KC_DB_PASSWORD
          #  valueFrom:
          #    secretKeyRef:
          #      name: keycloak-db
          #      key: password

          - name: KC_HOSTNAME
            value: faf-auth-proxy.services.atlantishq.de

          - name: KC_PROXY_HEADERS
            value: xforwarded

        volumeMounts:
          - name: realm-import
            mountPath: /opt/keycloak/data/import
            readOnly: true

      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
