apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
      - name: render-realm
        image: alpine
        command:
          - sh
          - -c
          - |
            apk add gettext
            envsubst < /templates/realm.json > /generated/realm.json
        volumeMounts:
          - name: realm-import
            mountPath: /templates
            readOnly: true
          - name: generated-config
            mountPath: /generated

        env:
          - name: OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: faf-auth-proxy-oidc-config
                key: client-secret
          - name: MAPGEN_SAAS_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: keycloak-secrets
                key: MAPGEN_SAAS_CLIENT_SECRET
          - name: FAF_OIDC_SECRET
            valueFrom:
              secretKeyRef:
                name: keycloak-secrets
                key: FAF_OIDC_SECRET
          - name: FA_METRICS_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: keycloak-secrets
                key: FA_METRICS_CLIENT_SECRET

      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:26.3.3

        args:
          - start
          - --import-realm

        env:
          - name: KC_HTTP_ENABLED
            value: "true"

          - name: KC_BOOTSTRAP_ADMIN_USERNAME
            value: admin

          - name: KC_BOOTSTRAP_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: keycloak-secrets
                key: KC_ADMIN_PASSWORD

          - name: KC_HOSTNAME
            value: faf-auth-proxy.services.atlantishq.de

          - name: KC_PROXY_HEADERS
            value: xforwarded

        volumeMounts:
          - name: generated-config
            mountPath: /opt/keycloak/data/import

      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
        - name: generated-config
          emptyDir: {}
