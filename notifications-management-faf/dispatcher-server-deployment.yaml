apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-dispatcher
  labels:
    app: event-dispatcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-dispatcher
  template:
    metadata:
      labels:
        app: event-dispatcher
    spec:
      containers:
        - name: event-dispatcher
          image: harbor-registry.atlantishq.de/atlantishq/event-dispatcher
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:

            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: fa-nofication-management-db-secret
                  key: database-url

            - name: DISPATCH_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fa-notification-secrets
                  key: DISPATCHER_ACCESS_TOKEN

            - name: SETTINGS_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fa-notification-secrets
                  key: DISPATCHER_SETTINGS_TOKEN

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
