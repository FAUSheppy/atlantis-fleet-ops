apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trackmania
  labels:
    app: trackmania
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/redirect-entry-point: "https"
    traefik.ingress.kubernetes.io/redirect-permanent: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "sso-oauth2-forward-auth-trackmania@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - trackmania.atlantishq.de
      secretName: trackmania-tls
  rules:
    - host: trackmania.atlantishq.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trackmania
                port:
                  number: 80
