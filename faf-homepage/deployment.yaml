---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: faf-homepage
  labels:
    app.kubernetes.io/name: homepage
    app.kubernetes.io/instance: faf-community-hub
    app.kubernetes.io/part-of: faf-community-hub
spec:
  replicas: 1
  revisionHistoryLimit: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
      app.kubernetes.io/instance: faf-community-hub

  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
        app.kubernetes.io/instance: faf-community-hub
        app.kubernetes.io/part-of: faf-community-hub

      annotations:
        checksum/config: "replace-this-when-config-changes"

    spec:
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: download-custom-icons
          image: harbor-registry.atlantishq.de/atlantishq/icon-retriever
          imagePullPolicy: Always

          command:
            - python
            - /app/fetch_previews.py
            - /config/websites.yaml
            - --output-directory
            - /output

          volumeMounts:
            - name: custom-icons
              mountPath: /output

            - name: icon-config
              mountPath: /config
              readOnly: true

      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.12.2
          imagePullPolicy: IfNotPresent

          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "$(MY_POD_IP):3000,faf-hub.services.atlantishq.de"

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 2

          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3

          volumeMounts:
            - name: homepage-config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
              readOnly: true

            - name: homepage-config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
              readOnly: true

            - name: homepage-config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
              readOnly: true

            - name: homepage-config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
              readOnly: true

            - name: homepage-config
              mountPath: /app/config/docker.yaml
              subPath: docker.yaml
              readOnly: true

            - name: homepage-config
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
              readOnly: true

            - name: homepage-config
              mountPath: /app/config/custom.css
              subPath: custom.css
              readOnly: true

            - name: homepage-config
              mountPath: /app/config/custom.js
              subPath: custom.js
              readOnly: true

            - name: homepage-config
              mountPath: /app/config/proxmox.yaml
              subPath: proxmox.yaml
              readOnly: true

            - name: homepage-logs
              mountPath: /app/config/logs

            - name: custom-icons
              mountPath: /app/public/icons/custom
              readOnly: true

      volumes:
        - name: homepage-config
          configMap:
            name: homepage-config

        - name: homepage-logs
          emptyDir: {}

        - name: custom-icons
          emptyDir: {}

        - name: icon-config
          configMap:
            name: homepage-custom-icons

