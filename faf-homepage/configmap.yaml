apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: faf-homepage
  labels:
    app.kubernetes.io/name: homepage
    app.kubernetes.io/part-of: faf-community-hub
data:

  proxmox.yaml: |
    ---
  settings.yaml: |
    ---
    title: FAF Community Hub
    description: Community tools, games, learning resources and official FAF links

    theme: dark
    color: slate
    language: en
    background:
      image: https://images.atlantishq.de/m/fa-forever-background-2.jpg?x=1920&encoding=webp
      opacity: 55

    cardBlur: sm

    target: _blank
    fullWidth: true
    headerStyle: clean
    useEqualHeights: true
    disableCollapse: true
    hideVersion: true

    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: true
      hideVisitURL: false

    layout:
      Official Links:
        style: row
        columns: 3
        icon: mdi-link-variant

      Mini-Games:
        style: row
        columns: 2
        icon: mdi-gamepad-variant

      Tools & Helpers:
        style: row
        columns: 4
        icon: mdi-tools

      Learning Resources:
        style: row
        columns: 2
        icon: mdi-school

      Twitch & YouTube:
        style: row
        columns: 4
        icon: mdi-play-box-multiple

  services.yaml: |
    ---
    - Official Links:
        - FAForever:
            icon: https://images.atlantishq.de/m/faflogo.png
            href: https://faforever.com/
            description: Official Forged Alliance Forever website

        - FAF Forums:
            icon: https://images.atlantishq.de/m/faflogo.png
            href: https://forum.faforever.com/
            description: Community discussions, announcements and support

        - FAF Discord:
            icon: si-discord-#5865F2
            href: https://discord.gg/fQxrjwru6E
            description: Join the official FAF Discord community

        - Buy FA on Steam:
            icon: si-steam-#171A21
            href: https://store.steampowered.com/app/9420/Supreme_Commander_Forged_Alliance/
            description: Join the official FAF Discord community

        - Buy FA on GOG:
            icon: si-gogdotcom-#86328A
            href: https://www.gog.com/en/game/supreme_commander_gold_edition
            description: Join the official FAF Discord community


    - Mini-Games:
        - FAF Guesser:
            icon: /icons/custom/faf-guesser
            href: https://fafguessr.doodlepros.com/
            description: Guess FAF maps from pictures

        - Daily FAF Unit:
            icon: /icons/custom/faf-daily
            href: https://daily.doodlepros.com/
            description: Guess the daily Forged Alliance unit

    - Tools & Helpers:
        - MapGen Helper:
            icon: https://images.atlantishq.de/m/neroxis.png
            href: https://mapgen.services.atlantishq.de/
            description: Generate maps, browse existing maps and like your favourites
            widget:
              type: customapi
              url: https://mapgen.services.atlantishq.de/api-dev/stats
              refreshInterval: 30000
              mappings:
                  - field: maps
                    label: Maps

                  - field: map_votes
                    label: Votes

                  - field: users
                    label: Users

                  - field: request_queue
                    label: Queue

        - FAF Tracker:
            icon: https://images.atlantishq.de/m/sera-logo.png
            href: https://faftracker.xyz/
            description: View game histories, statistics and rating evolution

        - FAF Unit Database:
            icon: /icons/custom/unit-db
            href: https://faforever.github.io/etfreeman-db/#/
            description: Modern unit database with detailed unit information

        - Ladder Pool Tier Lists:
            icon: https://images.atlantishq.de/m/tierlist-2.png
            href: https://fa-companion.services.atlantishq.de/tierlist-overview
            description: Create tier lists for ladder pools and provide feedback
            widget:
              type: customapi
              url: https://fa-companion.services.atlantishq.de/api/debug/stats
              refreshInterval: 30000
              mappings:
                - field: map_pools
                  label: Map Pools
                - field: tier_lists
                  label: Tier Lists

    - Learning Resources:
        - Beginner's Guide:
            icon: mdi-school
            href: https://wiki.faforever.com/Play/Learning-SupCom/Beginners-Guide-to-Forged-Alliance
            description: Learn the fundamentals of Supreme Commander and Forged Alliance

        - FA Companion:
            icon: https://images.atlantishq.de/m/mod_icon.png
            href: https://fa-companion.services.atlantishq.de/
            description: Analyse games in real time, identify mistakes and browse build orders
            widget:
              type: customapi
              url: https://fa-companion.services.atlantishq.de/api/debug/stats
              refreshInterval: 30000
              mappings:
                - field: active_games
                  label: Active Games
                - field: games
                  label: Total Games
                - field: users
                  label: Users
                - field: alerts
                  label: Total Alerts

    - Twitch & YouTube:
        - FAF Live:
            icon: si-twitch-#9146FF
            href: https://www.twitch.tv/faflive
            description: Official Forged Alliance Forever Twitch channel

        - Forged Alliance Forever:
            icon: si-youtube-#FF0000
            href: https://www.youtube.com/c/ForgedAllianceForever
            description: Official Forged Alliance Forever YouTube channel

        - Stellar Tactician:
            icon: si-twitch-#9146FF
            href: https://www.twitch.tv/stellartactician
            description: High-level gameplay, strategy and snipes

        - The Meme Commander:
            icon: si-youtube-#FF0000
            href: https://www.youtube.com/@TheMemeCommander
            description: Game casts, entertainment and funny shorts

  widgets.yaml: |
    ---

  bookmarks.yaml: |
    ---
    []

  docker.yaml: |
    ---

  kubernetes.yaml: |
    ---

  custom.css: |
    /*
     * Optional public-facing styling.
     * Remove this content to use the standard Homepage appearance.
     */

    #page_wrapper {
      max-width: 1800px;
      margin-left: auto;
      margin-right: auto;
    }

  custom.js: |
    // Add optional custom JavaScript here.
