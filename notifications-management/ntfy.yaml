apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:latest
          args:
            - serve
          ports:
            - containerPort: 80
          env:
            - name: NTFY_BASE_URL
              value: "https://push.rancher.katzencluster.atlantishq.de"
            - name: NTFY_BEHIND_PROXY
              value: "true"
            - name: NTFY_AUTH_DEFAULT_ACCESS
              value: "deny-all"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nofication-management-db-secret
                  key: database-url-hedgedoc-style
          volumeMounts:
            - name: cache
              mountPath: /var/cache/ntfy
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 40
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 40
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
spec:
  selector:
    app: ntfy
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
