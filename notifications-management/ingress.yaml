apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlantis-verify-ingress-sso
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/redirect-entry-point: "https"
    traefik.ingress.kubernetes.io/redirect-permanent: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "sso-oauth2-forward-auth-atlantis-verify@kubernetescrd"
spec:
  tls:
    - hosts:
        - verify.rancher.katzencluster.atlantishq.de
      secretName: atlanits-verify-tls
  rules:
    - host: verify.rancher.katzencluster.atlantishq.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atlantis-verify
                port:
                  number: 5000
