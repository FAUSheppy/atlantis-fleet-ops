apiVersion: v1
kind: ConfigMap
metadata:
  name: docspell-config
  namespace: docspell
data:
  application.conf: |
    docspell {

      # --- Database ---
      jdbc {
        url = "jdbc:postgresql://${DB_HOST]:5432/${DB_NAME}"
        user = "${DB_USER}"
        password = ${DB_PASSWORD}
      }

      # --- Storage (S3 compatible) ---
      store {
        backend = "s3"

        s3 {
          endpoint = "${S3_ENDPOINT}"   # e.g. https://s3.amazonaws.com or MinIO
          bucket = "${S3_BUCKET}"
          access-key = "${S3_ACCESS_KEY}"
          secret-key = ${S3_SECRET_KEY}
          region = "${S3_REGION}"
          path-style-access = true
        }
      }

      # --- OIDC Authentication ---
      auth {
        oidc {
          enabled = true
          providers = [
            {
              id = "oidc"
              name = "OIDC"
              client-id = "${OIDC_CLIENT_ID}"
              client-secret = ${OIDC_CLIENT_SECRET}
              issuer = "${OIDC_ISSUER_URL}"
              scope = "openid profile email"
              user-name-attribute = "preferred_username"
              email-attribute = "email"
            }
          ]
        }
      }

      # --- Base URL ---
      server {
        base-url = "https://documents.services.atlantishq.de"
        bind = "0.0.0.0"
        port = 7880
      }
    }
