apiVersion: v1
kind: ConfigMap
metadata:
  name: docspell-config
  namespace: docspell
data:
  application.conf.tpl: |
    docspell.server {

      app-name = "Atlantis Documents"
      oidc-auto-redirect = true
      base-url = "https://documents.services.atlantishq.de"

      jdbc {
        url = "jdbc:postgresql://$DB_HOST:5432/$DB_NAME"
        user = "$DB_USER"
        password = "$DB_PASSWORD"
      }

      files {
        default-store = "s3"
        stores {
          s3 {
            enabled = true
            type = "s3"
            endpoint = "$S3_ENDPOINT"
            bucket = "$S3_BUCKET"
            access-key = "$S3_ACCESS_KEY"
            secret-key = "$S3_SECRET_KEY"
            region = "$S3_REGION"
            path-style-access = true
          }
        }
      }

      openid = [
        {
          enabled = true
          display = "AtlantisHQ Accounts"
          provider = {
            provider-id = "keycloak"
            client-id = "$OIDC_CLIENT_ID"
            client-secret = "$OIDC_CLIENT_SECRET"
            scope = "openid profile email"
            authorize-url = "https://keycloak.atlantishq.de/realms/master/protocol/openid-connect/auth"
            token-url = "https://keycloak.atlantishq.de/realms/master/protocol/openid-connect/token"
            user-url = "https://keycloak.atlantishq.de/realms/master/protocol/openid-connect/userinfo"
            sign-key = """"
    -----BEGIN CERTIFICATE-----                                                   
    
    -----END CERTIFICATE-----
    """"
            sig-algo = "RS256"
          }
          collective-key = "lookup:groups"
          user-key = "preferred_username"
        }
      ]

      bind {
        address = "0.0.0.0"
        port = 7880
      }

      postgresql = {
        use-default-connection = true
      }
    }
